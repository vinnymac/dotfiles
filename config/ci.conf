# CI configuration overrides for headless GitHub Actions runners.
# Sourced after config/default.conf — only override what differs.

INSTALL_APPLICATIONS=false   # skip GUI casks; headless environment
APPLY_MACOS_SETTINGS=false   # .macos requires an interactive macOS session
INSTALL_XCODE=false
INSTALL_ANDROID_TOOLS=false
INSTALL_AWS_CLI=false
INSTALL_CTF_TOOLS=false
