# Default configuration for dotfiles installation
# Override by creating config/user.conf (gitignored)

# Shell preference
PREFERRED_SHELL="bash"  # Options: bash, zsh

# Component toggles
INSTALL_HOMEBREW=true
INSTALL_PACKAGE_MANAGER=true
INSTALL_DEV_TOOLS=true
INSTALL_APPLICATIONS=true
INSTALL_NODE_TOOLS=true
INSTALL_AWS_CLI=false
INSTALL_ANDROID_TOOLS=false
INSTALL_XCODE=false
SYNC_DOTFILES=true
APPLY_MACOS_SETTINGS=true

# Package categories (can be toggled individually)
INSTALL_GNU_TOOLS=true
INSTALL_CTF_TOOLS=false
INSTALL_SECURITY_TOOLS=true
INSTALL_GIT_TOOLS=true
INSTALL_PRODUCTIVITY_APPS=true
INSTALL_DEV_APPS=true
INSTALL_LLM_APPS=true
INSTALL_MODERN_CLI=true

# Platform detection (auto-populated during installation)
PLATFORM=""
DISTRO=""
PACKAGE_MANAGER=""
