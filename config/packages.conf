# Package definitions by category
# Allows users to customize what gets installed

# Core utilities (recommended for all platforms)
CORE_PACKAGES=(
  git
  vim
  curl
  wget
  tree
  htop
)

# GNU tools (macOS enhancement, replace outdated macOS versions)
